name: Deploy

# Build a Docker image, push it to GHCR, then tell the VPS to pull + restart.
# Runs on every push to main; also runnable manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spawnweaver-api

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore, build, test
        run: dotnet test --nologo --configuration Release

  deploy:
    name: Build image & deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR requires a lowercase image path.
      - name: Resolve image name
        id: img
        run: echo "image=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Platform.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push the latest compose + Caddy config to the server so infra changes auto-apply.
      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy/docker-compose.deploy.yml,deploy/Caddyfile"
          target: "spawnweaver"
          overwrite: true

      - name: Pull & restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          SPAWNWEAVER_IMAGE: ${{ steps.img.outputs.image }}:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: SPAWNWEAVER_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd ~/spawnweaver
            docker compose --env-file deploy/.env -f deploy/docker-compose.deploy.yml pull
            docker compose --env-file deploy/.env -f deploy/docker-compose.deploy.yml up -d
            docker image prune -f
            docker logout ghcr.io
